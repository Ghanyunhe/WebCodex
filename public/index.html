<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Remote</title>
    <link rel="stylesheet" href="/styles.css?v=4">
  </head>
  <body>
    <main class="shell">
      <section class="sidebar" aria-label="Sessions">
        <header class="topbar">
          <div>
            <p class="eyebrow">Codex Remote</p>
            <h1>Chats</h1>
            <span class="brandNote">Projects and sessions stay anchored in the sidebar.</span>
          </div>
          <div class="topbarActions">
            <span id="connectionStatus" class="connectionStatus disconnected">Disconnected</span>
            <button id="connectionButton" class="connectionButton" type="button">Connect</button>
            <button id="refreshSidebar" title="Refresh sidebar" aria-label="Refresh sidebar"></button>
          </div>
        </header>

        <form id="authForm" class="auth">
          <label for="token">Access token</label>
          <div class="row">
            <input id="token" name="token" type="password" autocomplete="current-password">
            <button type="submit">Save</button>
          </div>
        </form>

        <a id="terminalLink" class="terminalLink" href="#" hidden>SSH</a>
        <div id="sidebarTree" class="sidebarTree"></div>
      </section>

      <section class="workspace" aria-label="Chat">
        <header class="chatHeader">
          <div>
            <p id="sessionKicker" class="eyebrow">New thread</p>
            <h2 id="sessionTitle">Codex</h2>
          </div>
          <div class="chatControls">
            <label class="controlField controlFieldWide" for="cwd">
              <span>Working directory</span>
              <input id="cwd" aria-label="Working directory" placeholder="Working directory">
            </label>
          </div>
        </header>

        <section class="healthPanel" aria-label="Connection health">
          <div class="healthCard">
            <span class="healthLabel">Connection</span>
            <strong id="healthSummary">Offline</strong>
            <span id="healthMeta" class="healthMeta">App-server is offline</span>
          </div>
          <div class="healthCard">
            <span class="healthLabel">Process</span>
            <strong id="processMeta">Not running</strong>
            <span id="activityMeta" class="healthMeta">No recent activity</span>
          </div>
        </section>

        <div id="messages" class="messages"></div>

        <section class="logPanel" aria-label="App-server logs">
          <div class="logPanelHeader">
            <div>
              <p class="eyebrow">App-server</p>
              <h3>Recent logs</h3>
            </div>
            <button id="toggleLogs" class="logToggle" type="button" aria-expanded="false">Show logs</button>
          </div>
          <div id="logBody" class="logBody" hidden>
            <div id="logEntries" class="logEntries"></div>
          </div>
        </section>

        <form id="chatForm" class="composer">
          <div class="composerMain">
            <textarea id="prompt" rows="4" placeholder="Ask Codex"></textarea>
            <div class="composerFooter">
              <div class="composerSelectors">
                <div class="picker" data-picker="reasoning">
                  <button id="reasoningButton" class="pickerButton" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
                  <div id="reasoningMenu" class="pickerMenu" hidden></div>
                </div>
                <div class="picker" data-picker="model">
                  <button id="modelButton" class="pickerButton" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
                  <div id="modelMenu" class="pickerMenu" hidden></div>
                </div>
                <div class="picker" data-picker="execution">
                  <button id="executionButton" class="pickerButton pickerButtonWide" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
                  <div id="executionMenu" class="pickerMenu pickerMenuWide" hidden></div>
                </div>
              </div>
            </div>
          </div>
          <button id="send" class="sendButton" type="submit">Send</button>
        </form>
      </section>
    </main>
    <script src="/app.js?v=13" type="module"></script>
  </body>
</html>
